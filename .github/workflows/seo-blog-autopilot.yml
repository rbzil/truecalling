# .github/workflows/seo-blog-autopilot.yml
#
# Twice a week (Sun + Thu, 8am UTC), generate 2 SEO articles in EN + FR via
# Claude API and open a PR for human review.
#
# Required secret:
#   ANTHROPIC_API_KEY  — Anthropic Claude API key (set in repo Secrets)
#
# The default GITHUB_TOKEN is enough for branch push + PR creation since the
# workflow has `permissions: contents: write, pull-requests: write`.

name: SEO Blog Autopilot

on:
  schedule:
    - cron: '0 8 * * 0'   # Sunday 08:00 UTC
    - cron: '0 8 * * 4'   # Thursday 08:00 UTC
  workflow_dispatch:
    inputs:
      articles_per_run:
        description: 'Number of articles to generate'
        required: false
        default: '2'
      dry_run:
        description: 'Set to "1" to skip writing files (debug only)'
        required: false
        default: '0'

permissions:
  contents: write
  pull-requests: write

jobs:
  autopilot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run autopilot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ARTICLES_PER_RUN: ${{ inputs.articles_per_run || '2' }}
          DRY_RUN: ${{ inputs.dry_run || '0' }}
        run: node scripts/seo-blog-autopilot.mjs

      - name: Verify build still passes
        if: ${{ inputs.dry_run != '1' }}
        run: npm run build

      - name: Configure git
        if: ${{ inputs.dry_run != '1' }}
        run: |
          git config user.name "truecalling-blog-bot"
          git config user.email "blog-bot@truecalling.ai"

      - name: Create branch + commit + push
        if: ${{ inputs.dry_run != '1' }}
        id: commit
        run: |
          set -euo pipefail
          DATE=$(date +%Y-%m-%d)
          BRANCH="blog/${DATE}-autopilot"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            BRANCH="${BRANCH}-$(date +%H%M)"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH"
          git add app/[locale]/blog/_lib/articles.fr.tsx app/[locale]/blog/_lib/articles.en.tsx
          git commit -m "feat(blog): autopilot — ${DATE} articles"
          git push origin "$BRANCH"

      - name: Open PR
        if: ${{ inputs.dry_run != '1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.commit.outputs.branch }}
        run: |
          set -euo pipefail
          DATE=$(date +%Y-%m-%d)
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Autopilot — ${DATE} blog articles" \
            --body-file /tmp/autopilot-pr-body.md
